<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tech Store</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <style>
        body { font-family: Arial, sans-serif; }
        .hero { background: url('https://example.com/hero.jpg') center/cover; height: 50vh; display: flex; align-items: center; justify-content: center; color: white; }
    </style>
</head>
<body>

    <div class="hero">
        <h1>Welcome to Tech Store</h1>
        <p>Your one-stop shop for the latest tech products!</p>
    </div>

    <div class="container mt-5">
        <h2>Featured Products</h2>
        <div id="product-carousel" class="carousel slide" data-ride="carousel">
            <div class="carousel-inner">
                <div class="carousel-item active">
                    <img src="https://example.com/product1.jpg" class="d-block w-100" alt="Product 1">
                    <div class="carousel-caption d-none d-md-block">
                        <h5>Product 1</h5>
                        <p>Best tech gadget of the year!</p>
                    </div>
                </div>
                <div class="carousel-item">
                    <img src="https://example.com/product2.jpg" class="d-block w-100" alt="Product 2">
                    <div class="carousel-caption d-none d-md-block">
                        <h5>Product 2</h5>
                        <p>Discover the future of technology.</p>
                    </div>
                </div>
            </div>
            <a class="carousel-control-prev" href="#product-carousel" role="button" data-slide="prev">
                <span class="carousel-control-prev-icon" aria-hidden="true"></span>
                <span class="sr-only">Previous</span>
            </a>
            <a class="carousel-control-next" href="#product-carousel" role="button" data-slide="next">
                <span class="carousel-control-next-icon" aria-hidden="true"></span>
                <span class="sr-only">Next</span>
            </a>
        </div>
    </div>

    <div class="container mt-5">
        <h2>Shopping Cart</h2>
        <button onclick="addToCart()" class="btn btn-primary">Add to Cart</button>
        <p id="cart-count">Items in Cart: 0</p>
    </div>

    <footer class="text-center mt-5">
        <h5>Contact Us</h5>
        <a href="mailto:info@techstore.com">Email Us</a>
        <p>Or reach us on <a href="https://wa.me/1234567890">WhatsApp</a></p>
    </footer>

    <script>
        let cartCount = 0;
        function addToCart() {
            cartCount++;
            document.getElementById('cart-count').innerText = 'Items in Cart: ' + cartCount;
        }
    </script>
    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.9.2/dist/umd/popper.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
</body>
</html>
